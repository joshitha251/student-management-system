{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'students/style.css' %}">
</head>
<body>
    <div class="dashboard-page">
        <div class="dashboard-shell">
            <div class="dashboard-container">
                <div class="dashboard-topbar">
                    <h1 class="dashboard-title">Student List</h1>
                    <a class="btn btn-primary btn-add" href="{% url 'add_student' %}">Add New Student</a>
                </div>

                <form class="student-search-form" method="get" action="">
                    <label class="student-search-label" for="student-search">Search</label>
                    <input
                        id="student-search"
                        class="input student-search-input"
                        type="search"
                        name="q"
                        value="{{ q }}"
                        placeholder="Search by name or PIN..."
                        autocomplete="off"
                    >
                    {% if q %}
                    <a class="btn btn-clear-search" href="{% url 'student_list' %}">Clear</a>
                    {% endif %}
                    <button class="btn btn-primary student-search-btn" type="submit">Search</button>
                </form>

                <div class="students-table-wrap">
                    <div class="students-table-head students-row">
                        <div class="col serial-col">Serial Number</div>
                        <div class="col name-col">Student Name</div>
                        <div class="col pin-col">PIN</div>
                        <div class="col actions-col">Actions</div>
                    </div>

                    {% for student in students %}
                    <div class="students-row students-body-row">
                        <div class="col serial-col">{{ forloop.counter }}</div>
                        <div class="col name-col">{{ student.name }}</div>
                        <div class="col pin-col">{{ student.pin }}</div>
                        <div class="col actions-col action-group">
                            <a class="btn btn-primary btn-view" href="{% url 'student_detail' student.id %}">View</a>
                            <button
                                type="button"
                                class="btn btn-danger btn-icon delete-open-btn"
                                data-delete-url="{% url 'delete_student' student.id %}"
                                aria-label="Delete student"
                                title="Delete"
                            >🗑</button>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <div class="dashboard-footer">
                    <a class="btn btn-danger btn-logout" href="{% url 'logout' %}">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <div id="delete-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="delete-modal-title">
        <div class="modal-dialog">
            <p id="delete-modal-title" class="modal-message">Are you sure you want to delete this record?</p>
            <div class="modal-actions">
                <button type="button" class="btn btn-primary modal-cancel-btn" id="delete-modal-cancel">Cancel</button>
                <a class="btn btn-danger modal-confirm-btn" id="delete-modal-confirm" href="#">Delete</a>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var overlay = document.getElementById('delete-modal');
            var confirmLink = document.getElementById('delete-modal-confirm');
            var cancelBtn = document.getElementById('delete-modal-cancel');

            function openModal(url) {
                confirmLink.setAttribute('href', url);
                overlay.classList.add('is-open');
                overlay.setAttribute('aria-hidden', 'false');
            }

            function closeModal() {
                overlay.classList.remove('is-open');
                overlay.setAttribute('aria-hidden', 'true');
                confirmLink.setAttribute('href', '#');
            }

            document.querySelectorAll('.delete-open-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var url = btn.getAttribute('data-delete-url');
                    if (url) openModal(url);
                });
            });

            cancelBtn.addEventListener('click', closeModal);

            overlay.addEventListener('click', function (e) {
                if (e.target === overlay) closeModal();
            });

            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && overlay.classList.contains('is-open')) closeModal();
            });
        })();
    </script>
</body>
</html>
