<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Main Content -->
    <div class="container">
        {% block content %}
        <!-- Page-specific content will be injected here -->
        {% endblock %}
    </div>

    <!-- Toast Container -->
    <div aria-live="polite" aria-atomic="true" class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div class="toast" id="toastMessage" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle"></strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <!-- Include Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Toast Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Serialize Django messages into a JavaScript array
            const messages = [
                {% for message in messages %}
                    { 
                        "message": "{{ message|escapejs }}", 
                        "tags": "{{ message.tags }}" 
                    },
                {% endfor %}
            ];

            if (messages.length > 0) {
                const toast = new bootstrap.Toast(document.getElementById('toastMessage'));
                const toastTitle = document.getElementById('toastTitle');
                const toastBody = document.getElementById('toastBody');

                // Set toast content
                const message = messages[0]; // Show the first message
                toastTitle.textContent = message.tags === 'success' ? 'Success' : 'Error';
                toastBody.textContent = message.message;

                // Show the toast
                toast.show();
            }
        });
    </script>
</body>
</html>
